<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0e7a5d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0c0e12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#f0bf4f" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0c0e12" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0e12"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle card suit watermarks -->
  <text x="120" y="480" font-size="280" fill="#e0ddd4" opacity="0.02" font-family="serif">&#9824;</text>
  <text x="900" y="350" font-size="220" fill="#e0ddd4" opacity="0.015" font-family="serif" transform="rotate(15,1000,280)">&#9830;</text>

  <!-- FELT logo -->
  <text x="100" y="120" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="42" fill="#f0bf4f" letter-spacing="8">FELT</text>
  <text x="100" y="145" font-family="'Space Grotesk', sans-serif" font-weight="500" font-size="12" fill="#6b7a74" letter-spacing="4">PROTOCOL</text>

  <!-- Main headline -->
  <text x="100" y="300" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="72" fill="#e0ddd4">Poker, dealt</text>
  <text x="100" y="385" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="72" fill="#e0ddd4">by the chain.</text>

  <!-- Subtitle -->
  <text x="100" y="440" font-family="'Space Grotesk', sans-serif" font-weight="400" font-size="22" fill="#6b7a74">Provably fair poker on a purpose-built blockchain.</text>

  <!-- Emerald chip icon -->
  <circle cx="1060" cy="315" r="80" fill="#0e7a5d" opacity="0.25"/>
  <circle cx="1060" cy="315" r="55" fill="#0d6b4e" stroke="#f0bf4f" stroke-width="3" opacity="0.5"/>
  <circle cx="1060" cy="315" r="22" fill="#f0bf4f" opacity="0.4"/>

  <!-- Bottom accent line -->
  <rect x="100" y="580" width="200" height="3" rx="1.5" fill="#0e7a5d"/>
  <text x="100" y="610" font-family="'IBM Plex Mono', monospace" font-size="14" fill="#6b7a74">feltprotocol.com</text>
</svg>
