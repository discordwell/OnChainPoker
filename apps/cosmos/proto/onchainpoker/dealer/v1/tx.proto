syntax = "proto3";

package onchainpoker.dealer.v1;

option go_package = "x/dealer/types";
option (gogoproto.equal_all) = true;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";

import "onchainpoker/dealer/v1/dealer.proto";

// Msg defines the x/dealer Msg service.
//
// NOTE: After editing this file, regenerate generated Go code with:
//   cd apps/cosmos/proto && buf generate
// (the BeaconCommit / BeaconReveal RPCs below require this regen before the
//  module can build — see x/dealer/committee/beacon.go for the pure helpers
//  the keeper integration depends on.)
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc BeginEpoch(MsgBeginEpoch) returns (MsgBeginEpochResponse);
  rpc DkgCommit(MsgDkgCommit) returns (MsgDkgCommitResponse);
  rpc DkgComplaintMissing(MsgDkgComplaintMissing) returns (MsgDkgComplaintMissingResponse);
  rpc DkgComplaintInvalid(MsgDkgComplaintInvalid) returns (MsgDkgComplaintInvalidResponse);
  // DkgShareReveal is the LEGACY v1 plaintext reveal path. It remains
  // accepted for backward compatibility with v1 chains; DKG v2 replaces it
  // with MsgDkgEncryptedShare (see docs/DKG-V2.md).
  rpc DkgShareReveal(MsgDkgShareReveal) returns (MsgDkgShareRevealResponse);
  // DKG v2: encrypted-share delivery. Replaces the plaintext DkgShareReveal
  // once v2 is activated. The message carries an ElGamal ciphertext on the
  // share point plus a 160-byte NIZK binding it to the dealer's Feldman
  // commitments, plus an AES-GCM ciphertext of the share scalar bound to
  // the NIZK via AAD.
  rpc DkgEncryptedShare(MsgDkgEncryptedShare) returns (MsgDkgEncryptedShareResponse);
  rpc FinalizeEpoch(MsgFinalizeEpoch) returns (MsgFinalizeEpochResponse);
  rpc DkgTimeout(MsgDkgTimeout) returns (MsgDkgTimeoutResponse);

  // Randomness-beacon commit-reveal (replaces devnet RandEpoch on prod chains).
  rpc BeaconCommit(MsgBeaconCommit) returns (MsgBeaconCommitResponse);
  rpc BeaconReveal(MsgBeaconReveal) returns (MsgBeaconRevealResponse);

  rpc InitHand(MsgInitHand) returns (MsgInitHandResponse);
  rpc SubmitShuffle(MsgSubmitShuffle) returns (MsgSubmitShuffleResponse);
  rpc FinalizeDeck(MsgFinalizeDeck) returns (MsgFinalizeDeckResponse);
  rpc SubmitPubShare(MsgSubmitPubShare) returns (MsgSubmitPubShareResponse);
  rpc SubmitEncShare(MsgSubmitEncShare) returns (MsgSubmitEncShareResponse);
  rpc FinalizeReveal(MsgFinalizeReveal) returns (MsgFinalizeRevealResponse);
  rpc Timeout(MsgTimeout) returns (MsgTimeoutResponse);
}

message MsgBeginEpoch {
  option (cosmos.msg.v1.signer) = "caller";
  option (gogoproto.goproto_getters) = false;

  string caller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // If epoch_id is 0, the chain allocates next epoch id deterministically.
  uint64 epoch_id = 2;
  uint32 committee_size = 3;
  uint32 threshold = 4;

  // Optional randomness input used for deterministic committee sampling (devnet).
  bytes rand_epoch = 5;

  // Optional DKG phase durations in blocks.
  uint64 commit_blocks = 6;
  uint64 complaint_blocks = 7;
  uint64 reveal_blocks = 8;
  uint64 finalize_blocks = 9;
}

message MsgBeginEpochResponse {}

message MsgDkgCommit {
  option (cosmos.msg.v1.signer) = "dealer";
  option (gogoproto.goproto_getters) = false;

  string dealer = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 epoch_id = 2;
  repeated bytes commitments = 3;

  // DKG v2 only: the dealer's per-epoch ephemeral ElGamal/Ristretto255 public
  // key pkR = skR*G used by other dealers to encrypt shares destined for this
  // dealer. 32 bytes canonical, or empty on v1 chains. See docs/DKG-V2.md.
  bytes ephemeral_pubkey = 4;
}

message MsgDkgCommitResponse {}

message MsgDkgComplaintMissing {
  option (cosmos.msg.v1.signer) = "complainer";
  option (gogoproto.goproto_getters) = false;

  string complainer = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 epoch_id = 2;
  string dealer = 3 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
}

message MsgDkgComplaintMissingResponse {}

message MsgDkgComplaintInvalid {
  option (cosmos.msg.v1.signer) = "complainer";
  option (gogoproto.goproto_getters) = false;

  string complainer = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 epoch_id = 2;
  string dealer = 3 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  bytes share_msg = 4;
}

message MsgDkgComplaintInvalidResponse {}

message MsgDkgShareReveal {
  option (cosmos.msg.v1.signer) = "dealer";
  option (gogoproto.goproto_getters) = false;

  string dealer = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 epoch_id = 2;
  string to = 3 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  bytes share = 4;
}

message MsgDkgShareRevealResponse {}

// MsgDkgEncryptedShare delivers one Feldman-consistent DKG share from a
// dealer to a specific recipient index, encrypted under the recipient's
// per-epoch ephemeral pubkey. Accepted by the chain only when the 160-byte
// NIZK (DkgEncShareProof, see apps/cosmos/internal/ocpcrypto/dkg_encshare.go)
// verifies against the dealer's previously-posted Feldman commitments at
// index `recipient_index` under `DealerMember.ephemeral_pubkey`. The
// plaintext scalar is AEAD-encrypted in `scalar_ct` and is recoverable only
// by the recipient holding `skR`. No share scalar ever appears in plaintext
// on-chain.
message MsgDkgEncryptedShare {
  option (cosmos.msg.v1.signer) = "dealer";
  option (gogoproto.goproto_getters) = false;

  string dealer = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 epoch_id = 2;
  uint32 recipient_index = 3;

  // 32-byte ElGamal ephemeral = r*G.
  bytes u = 4;
  // 32-byte ElGamal ciphertext = s*G + r*pkR.
  bytes v = 5;
  // 160-byte NIZK proof (DkgEncShareProof). Binds (u, v) to the Feldman
  // commitments at index `recipient_index`.
  bytes proof = 6;
  // 48-byte AES-256-GCM ciphertext of the share scalar s (LE), AAD=proof.
  // Recipient derives the AEAD key from skR*U = r*pkR.
  bytes scalar_ct = 7;
}

message MsgDkgEncryptedShareResponse {}

message MsgFinalizeEpoch {
  option (cosmos.msg.v1.signer) = "caller";
  option (gogoproto.goproto_getters) = false;

  string caller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 epoch_id = 2;
}

message MsgFinalizeEpochResponse {}

message MsgDkgTimeout {
  option (cosmos.msg.v1.signer) = "caller";
  option (gogoproto.goproto_getters) = false;

  string caller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 epoch_id = 2;
}

message MsgDkgTimeoutResponse {}

// MsgBeaconCommit is sent by a bonded validator during the beacon commit
// window to register a hash-commit over its 32-byte random salt. See
// x/dealer/committee/beacon.go for the exact H() used.
message MsgBeaconCommit {
  option (cosmos.msg.v1.signer) = "validator";
  option (gogoproto.goproto_getters) = false;

  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 epoch_id = 2;
  // sha256 commit = H(domain || validator || epoch_id || salt). 32 bytes.
  bytes commit = 3;
}

message MsgBeaconCommitResponse {}

// MsgBeaconReveal is sent by a bonded validator during the beacon reveal
// window. The salt must match the previously-committed hash; otherwise the
// validator is marked reveal-faulting and slashed at finalization.
message MsgBeaconReveal {
  option (cosmos.msg.v1.signer) = "validator";
  option (gogoproto.goproto_getters) = false;

  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 epoch_id = 2;
  // 32-byte salt that was committed to in MsgBeaconCommit.
  bytes salt = 3;
}

message MsgBeaconRevealResponse {}

message MsgInitHand {
  option (cosmos.msg.v1.signer) = "caller";
  option (gogoproto.goproto_getters) = false;

  string caller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 table_id = 2;
  uint64 hand_id = 3;
  uint64 epoch_id = 4;
  uint32 deck_size = 5; // default 52
}

message MsgInitHandResponse {}

message MsgSubmitShuffle {
  option (cosmos.msg.v1.signer) = "shuffler";
  option (gogoproto.goproto_getters) = false;

  string shuffler = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 table_id = 2;
  uint64 hand_id = 3;
  uint32 round = 4;
  bytes proof_shuffle = 5;
}

message MsgSubmitShuffleResponse {}

message MsgFinalizeDeck {
  option (cosmos.msg.v1.signer) = "caller";
  option (gogoproto.goproto_getters) = false;

  string caller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 table_id = 2;
  uint64 hand_id = 3;
}

message MsgFinalizeDeckResponse {}

message MsgSubmitPubShare {
  option (cosmos.msg.v1.signer) = "validator";
  option (gogoproto.goproto_getters) = false;

  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 table_id = 2;
  uint64 hand_id = 3;
  uint32 pos = 4;
  bytes pub_share = 5;
  bytes proof_share = 6;
}

message MsgSubmitPubShareResponse {}

message MsgSubmitEncShare {
  option (cosmos.msg.v1.signer) = "validator";
  option (gogoproto.goproto_getters) = false;

  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  uint64 table_id = 2;
  uint64 hand_id = 3;
  uint32 pos = 4;
  bytes pk_player = 5;
  bytes enc_share = 6;
  bytes proof_enc_share = 7;
}

message MsgSubmitEncShareResponse {}

message MsgFinalizeReveal {
  option (cosmos.msg.v1.signer) = "caller";
  option (gogoproto.goproto_getters) = false;

  string caller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 table_id = 2;
  uint64 hand_id = 3;
  uint32 pos = 4;
}

message MsgFinalizeRevealResponse {}

message MsgTimeout {
  option (cosmos.msg.v1.signer) = "caller";
  option (gogoproto.goproto_getters) = false;

  string caller = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 table_id = 2;
  uint64 hand_id = 3;
}

message MsgTimeoutResponse {}
