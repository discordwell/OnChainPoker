syntax = "proto3";

package onchainpoker.dealer.v1;

option go_package = "x/dealer/types";
option (gogoproto.equal_all) = true;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";

message GenesisState {
  uint64 next_epoch_id = 1;
  DealerEpoch epoch = 2 [(gogoproto.nullable) = true];
  DealerDKG dkg = 3 [(gogoproto.nullable) = true];
  Params params = 4 [(gogoproto.nullable) = false];

  // Randomness-beacon commit-reveal state for the upcoming epoch (if any).
  // NOTE: after editing this file, regenerate generated Go code with:
  //   cd apps/cosmos/proto && buf generate
  BeaconState beacon = 5 [(gogoproto.nullable) = true];
}

// Params defines the x/dealer module parameters.
//
// NOTE: Dealer faults are intended to map to real PoS stake risk:
// slashing and (optional) jailing of the underlying validator.
message Params {
  // Slash fraction (in basis points, 1 bps = 0.01%) for objective DKG faults.
  uint32 slash_bps_dkg = 1;

  // Slash fraction (in basis points, 1 bps = 0.01%) for objective per-hand dealer faults.
  uint32 slash_bps_hand_dealer = 2;

  // Jail duration (in seconds) for objective DKG faults.
  uint64 jail_seconds_dkg = 3;

  // Jail duration (in seconds) for objective per-hand dealer faults.
  uint64 jail_seconds_hand_dealer = 4;
}

message DealerMember {
  // Validator operator address (valoper).
  string validator = 1;

  // Shamir x-coordinate (non-zero).
  uint32 index = 2;

  // 32-byte ristretto point (Y_i), set at epoch finalize.
  bytes pub_share = 3;

  // 32-byte ed25519 consensus pubkey snapshot (for DKG share-msg signatures).
  bytes cons_pubkey = 4;

  // Consensus power at committee selection time (used for slashing distribution height/power).
  int64 power = 5;
}

message DealerEpoch {
  uint64 epoch_id = 1;
  uint32 threshold = 2;

  // 32-byte ristretto point.
  bytes pk_epoch = 3;

  // sha256 (v0 placeholder) over the accepted transcript view.
  bytes transcript_root = 4;

  // Distribution/obligation height captured at committee selection time (typically the DKG start height).
  // Used for slashing so validators cannot evade by unbonding immediately after being selected.
  int64 start_height = 7;

  // Canonical ordering: lexicographically ascending by validator.
  repeated string slashed = 5;

  repeated DealerMember members = 6 [(gogoproto.nullable) = false];
}

message DealerDKGCommit {
  string dealer = 1;
  repeated bytes commitments = 2;
}

message DealerDKGComplaint {
  uint64 epoch_id = 1;
  string complainer = 2;
  string dealer = 3;
  string kind = 4; // "missing" | "invalid"
  bytes share_msg = 5;
}

message DealerDKGShareReveal {
  uint64 epoch_id = 1;
  string dealer = 2;
  string to = 3;
  bytes share = 4;
}

message DealerDKG {
  uint64 epoch_id = 1;
  uint32 threshold = 2;

  repeated DealerMember members = 3 [(gogoproto.nullable) = false];

  int64 start_height = 4;
  int64 commit_deadline = 5;
  int64 complaint_deadline = 6;
  int64 reveal_deadline = 7;
  int64 finalize_deadline = 8;

  bytes rand_epoch = 9;

  repeated DealerDKGCommit commits = 10 [(gogoproto.nullable) = false];
  repeated DealerDKGComplaint complaints = 11 [(gogoproto.nullable) = false];
  repeated DealerDKGShareReveal reveals = 12 [(gogoproto.nullable) = false];
  repeated string slashed = 13;
}

message DealerCiphertext {
  bytes c1 = 1;
  bytes c2 = 2;
}

message DealerPubShare {
  uint32 pos = 1;
  string validator = 2;
  uint32 index = 3;
  bytes share = 4;
  bytes proof = 5;
}

message DealerEncShare {
  uint32 pos = 1;
  string validator = 2;
  uint32 index = 3;
  bytes pk_player = 4;
  bytes enc_share = 5; // 64 bytes u||v
  bytes proof = 6;     // 160 bytes
}

message DealerReveal {
  uint32 pos = 1;
  uint32 card_id = 2; // 0..51
}

// BeaconState tracks the commit-reveal randomness beacon for an upcoming
// epoch. It is written when the dealer module opens a beacon window and is
// consumed when that epoch is begun.
//
// Security: unlike DevnetRandEpoch (proposer-influenceable block hash mix),
// the beacon output is fixed by an adversary-agnostic mechanism: all commits
// must be posted before any salt is revealed.
message BeaconState {
  // Epoch id this beacon will seed once the reveal window closes.
  uint64 epoch_id = 1;

  // Block height at which the commit window opens / closes.
  int64 commit_open_height = 2;
  int64 commit_close_height = 3;

  // Block height at which the reveal window closes.
  int64 reveal_close_height = 4;

  // Minimum number of revealed salts required to produce a non-fallback
  // beacon. If fewer reveals are received, the epoch falls back to devnet
  // randomness (allowed only on devnet/local chain ids) and emits an event.
  uint32 threshold = 5;

  // Validator commits (sorted lexicographically by validator).
  repeated BeaconCommitEntry commits = 6 [(gogoproto.nullable) = false];

  // Validator reveals (sorted lexicographically by validator). Only validators
  // that committed may appear here.
  repeated BeaconRevealEntry reveals = 7 [(gogoproto.nullable) = false];

  // Finalized beacon output (32 bytes). Empty until the reveal window closes
  // and the chain consumes the state to compute the final value.
  bytes final = 8;

  // True if finalization used the fallback (insufficient reveals or non-prod
  // chain id). Auditable via FinalizeBeacon event.
  bool fallback = 9;
}

message BeaconCommitEntry {
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  // 32-byte sha256 commit.
  bytes commit = 2;
}

message BeaconRevealEntry {
  string validator = 1 [(cosmos_proto.scalar) = "cosmos.ValidatorAddressString"];
  // 32-byte salt whose H() matched the stored commit.
  bytes salt = 2;
}

message DealerHand {
  uint64 epoch_id = 1;
  bytes pk_hand = 2;
  uint32 deck_size = 3;

  repeated DealerCiphertext deck = 4 [(gogoproto.nullable) = false];

  uint32 shuffle_step = 5;
  bool finalized = 6;

  int64 shuffle_deadline = 7;     // unix seconds
  int64 hole_shares_deadline = 8; // unix seconds

  repeated DealerPubShare pub_shares = 9 [(gogoproto.nullable) = false];
  repeated DealerEncShare enc_shares = 10 [(gogoproto.nullable) = false];
  repeated DealerReveal reveals = 11 [(gogoproto.nullable) = false];

  // Per-hand init-time block entropy mixed into k_hand (v2 hand-derive).
  // Captured at InitHand from sdkCtx.BlockHeight() and sdkCtx.BlockHeader().LastBlockId.Hash.
  // Purpose: bound the retroactive-decryption window if the epoch secret later leaks —
  // without these, k_hand is publicly recomputable from (epochId, tableId, handId) alone,
  // so leaking the epoch secret decrypts every past hand in the epoch. Binding to
  // per-hand block entropy that the attacker cannot grind after the fact raises the bar.
  int64 init_height = 20;
  bytes init_hash_salt = 21; // 32 bytes (LastBlockId.Hash at init time)
}
